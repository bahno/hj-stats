name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # `tsc -b` covers src/ and the edge functions' _shared modules.
      - run: npx tsc -b
      - run: npm test

  # The edge function entrypoints import from https:// URLs and use Deno
  # globals, so tsc can't see them at all — they are only typechecked here.
  edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check supabase/functions/*/index.ts
