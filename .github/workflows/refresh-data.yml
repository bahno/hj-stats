name: Refresh reference data

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r pipeline/requirements.txt
      - run: python pipeline/scrape_placing.py
      - run: python pipeline/parse_scoring.py
      - run: python pipeline/verify.py
      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'data: weekly refresh of scoring/placing tables'
          title: 'Weekly data refresh'
          body: |
            Automated refresh of `src/data/*.json` from World Athletics sources.
            Verified by `pipeline/verify.py`. Review the diff before merging.
          branch: data/weekly-refresh
          add-paths: src/data/*.json
